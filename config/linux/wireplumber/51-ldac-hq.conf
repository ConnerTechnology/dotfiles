# WirePlumber Bluetooth audio configuration for LDAC-capable devices
# Prioritizes LDAC codec (up to 990kbps) over SBC/SBC-XQ (345kbps)
# Auto-connects to A2DP Sink (high fidelity) instead of HSP (phone-call quality)

monitor.bluez.properties = {
  bluez5.codecs = [ ldac sbc sbc_xq ]
  bluez5.default.rate = 96000
}

monitor.bluez.rules = [
  {
    matches = [
      {
        device.name = "~bluez_card.*"
      }
    ]
    actions = {
      update-props = {
        bluez5.auto-connect = [ a2dp_sink ]
      }
    }
  }
]
